# Easy Agent Development Environment

# PGVector (PostgreSQL + pgvector extension)
spring.datasource.url=jdbc:postgresql://localhost:5432/easy_agent
spring.datasource.username=easy_agent
spring.datasource.password=easy_agent_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring AI PGVector Store
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE
spring.ai.vectorstore.pgvector.dimensions=1536

# MySQL (for application data)
easy-agent.datasource.mysql.url=jdbc:mysql://localhost:3306/easy_agent
easy-agent.datasource.mysql.username=easy_agent
easy-agent.datasource.mysql.password=easy_agent_password

# LLM Configuration (uncomment one)
# easy-agent.llm.provider=DASHSCOPE
# easy-agent.llm.dash-scope.api-key=your-dashscope-api-key

