version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: easy-agent-pgvector
    environment:
      POSTGRES_DB: easy_agent
      POSTGRES_USER: easy_agent
      POSTGRES_PASSWORD: easy_agent_password
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easy_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: easy-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: easy_agent
      MYSQL_USER: easy_agent
      MYSQL_PASSWORD: easy_agent_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
  mysql_data:
